          - "Implementé servicios SOAP en IBM Integration Bus (ESQL + IBM MQ) y APIs REST en IBM API Connect (JavaScript/YAML)."
          - "Cubrí 85%+ de integraciones con pruebas unitarias, E2E y de rendimiento, asegurando estabilidad en producción."
      - company: Fintra S.A.
