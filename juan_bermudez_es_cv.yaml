          - "Ejecuté la actualización de Java 6 a Java 8, mejorando la compatibilidad y el rendimiento general."
          - "Implementé GitLab on-premise reemplazando SVN, habilitando workflows modernos de CI/CD."
          - "Desarrollé de la primera API REST de la compañía para su sitio web, utilizando Java y JAX-RS."
