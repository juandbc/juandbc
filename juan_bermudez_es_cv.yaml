        para empresas del sector financiero. Lidero los esfuerzos de desarrollo backend desde el concepto hasta la producción,
        integrando la calidad mediante estrategias de pruebas automatizadas para APIs y UIs. Mi conjunto técnico incluye frameworks
        backend en Java, Karate, Serenity BDD (Screenplay), Selenium, Playwright, Postman y REST-assured.
        Me enfoco en obtener feedback de usuario accionable, en diseñar pruebas mantenibles y en lograr mejoras medibles en la calidad del producto
